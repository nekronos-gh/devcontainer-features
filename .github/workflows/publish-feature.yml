name: Feature CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [published]
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        baseImage:
          # apt-get
          - debian:latest
          - ubuntu:latest
          # apk
          - alpine:latest
          # dnf
          - fedora:latest
          # yum
          - centos:7
          # pacman
          - archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test autogenerated
        run: devcontainer features test -f nekronos-workbench -i ${{ matrix.baseImage }} .
  publish:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: devcontainers-community/publish-feature@v1
        with:
          path: ./src/nekronos-workbench
          image: ghcr.io/${{ github.repository }}/*
