name: Feature CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [published]
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        baseImage:
          # apt-get
          - debian:latest
          - ubuntu:latest
          # apk
          - alpine:latest
          # dnf
          - fedora:latest
          # yum
          - rockylinux:8
          # pacman
          - archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Test autogenerated
        run: devcontainer features test -f nekronos-workbench -i ${{ matrix.baseImage }} .
  publish:
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
